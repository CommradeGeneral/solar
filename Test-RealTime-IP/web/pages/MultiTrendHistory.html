<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCADA - Historical Multi-Trend</title>

    <!-- Fonts / shared chrome -->
    <link rel="stylesheet" href="/css/cairo.css">
    <link rel="stylesheet" href="/css/menu-tree.css">
    <link rel="stylesheet" href="/css/header-clock.css">

    <!-- Reuse the live Multi-Trend styling (tree + panels) -->
    <link rel="stylesheet" href="/css/multitrend.css">
    <!-- This page only -->
    <link rel="stylesheet" href="/css/multitrend_history.css">

    <!-- Chart.js (local vendor, no CDN) -->
    <script src="/vendor/chart.umd.min.js"></script>
</head>
<body class="tr-body">
    <!-- Side menu -->
    <script src="/js/menu-tree-init.js"></script>
    <aside id="menuTree" class="mt" aria-label="Project menu"></aside>
    <div id="menuTreeBackdrop" class="mt-backdrop" hidden></div>

    <!-- Header -->
    <header class="header tr-header">
        <button type="button" class="mt-open-btn" id="menuTreeOpenBtn" aria-label="Open menu"></button>
        <div class="header-logos">
            <div class="logo1"><img src="/images/Asorc.png" alt="Asorc"></div>
            <div class="logo2"><img src="/images/Enppi.png" alt="Enppi"></div>
            <div class="logo3"><img src="/images/infinty.png" alt="infinty"></div>
        </div>
        <div class="header-left">
            <h1 class="page-title">Historical Multi-Trend</h1>
        </div>
        <div class="hc" data-header-clock>
            <span class="hc-ico" aria-hidden="true">⏱</span>
            <span class="hc-time" aria-label="Current time">--:--</span>
        </div>
        <div class="header-right"></div>
    </header>

    <!-- Body: tree + chart -->
    <main class="tr-main">
        <!-- Tag tree -->
        <section class="tr-tree-panel" id="trTreePanel">
            <div class="tr-tree-head">
                <div class="tr-search-wrap">
                    <span class="tr-search-ico">🔍</span>
                    <input type="search" id="trSearch" class="tr-search"
                           placeholder="Search tag or device" autocomplete="off">
                </div>
                <div class="tr-tree-meta">
                    <span id="trTreeStat">Loading tags...</span>
                </div>
            </div>
            <div class="tr-tree-scroll" id="trTree" role="tree" aria-label="Tag tree"></div>
        </section>

        <!-- Chart -->
        <section class="tr-chart-panel">
            <!-- Toolbar: selected chips + max-tags + actions -->
            <div class="tr-toolbar">
                <span class="tr-count" id="trCount">0/5</span>
                <div class="tr-chips" id="trChips">
                    <span class="tr-hint">Pick up to 5 tags, set a date range, then press Load Data</span>
                </div>
                <label class="trh-maxwrap" title="Maximum number of tags" style="display:none">
                    Max <input type="number" id="trhMaxTags" class="trh-max" min="1" max="5" value="5">
                </label>
                <div class="tr-controls">
                    <button class="tr-btn" id="trhSnap" title="Save chart as image">📷</button>
                    <button class="tr-btn" id="trhReset" title="Reset zoom to full range">⤢</button>
                    <button class="tr-btn" id="trhClear" title="Remove all tags">🗑</button>
                </div>
            </div>

            <!-- Historical range controls -->
            <div class="trh-controls">
                <div class="trh-field">
                    <label>Start Date</label>
                    <input type="date" id="trhStartDate" class="trh-input">
                </div>
                <div class="trh-field">
                    <label>Start Time</label>
                    <input type="time" id="trhStartTime" class="trh-input" value="00:00">
                </div>
                <div class="trh-field">
                    <label>End Date</label>
                    <input type="date" id="trhEndDate" class="trh-input">
                </div>
                <div class="trh-field">
                    <label>End Time</label>
                    <input type="time" id="trhEndTime" class="trh-input" value="23:59">
                </div>
                <button class="trh-load" id="trhLoad">Load Data</button>
                <span class="trh-status" id="trhStatus"></span>
            </div>

            <!-- Chart -->
            <div class="tr-chart-wrap">
                <div class="tr-empty" id="trhEmpty">
                    <div class="tr-empty-ico">📈</div>
                    <p>No data loaded.</p>
                    <p class="tr-empty-sub">Select tags, choose a date range, and press Load Data.</p>
                </div>
                <canvas id="trhCanvas"></canvas>
            </div>

            <!-- Timeline navigator -->
            <div class="trh-nav">
                <div class="trh-nav-head">
                    <span class="trh-nav-title">TIMELINE NAVIGATOR
                        <small>(Scroll = Zoom · Drag chart / box = Pan)</small>
                    </span>
                    <span class="trh-badge trh-badge-days" id="trhDays">—</span>
                    <span class="trh-badge trh-badge-pts" id="trhPts">0 pts</span>
                </div>
                <div class="trh-nav-bar" id="trhNavBar">
                    <span class="trh-nav-edge trh-nav-start" id="trhNavStart"></span>
                    <span class="trh-nav-edge trh-nav-end" id="trhNavEnd"></span>
                    <div class="trh-viewport" id="trhViewport"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/multitrend_history.js"></script>
    <script src="/js/menu-tree.js"></script>
    <script src="/js/header-clock.js"></script>
</body>
</html>
