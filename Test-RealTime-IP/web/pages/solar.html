    <style>
      .header {
        background: linear-gradient(135deg, #0d1326 0%, #131b33 100%);
        height: auto;
        padding: 12px 24px;
        padding-left: calc(24px + var(--mt-offset, 0px));
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0;
        border-bottom: 1px solid rgba(52, 152, 219, 0.25);
        box-shadow: none;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        position: sticky;
        top: 0;
        z-index: 100;
        transition: none;
      }

      .header h1 {
        font-size: 20px;
        background: linear-gradient(135deg, #3498db, #2ecc71);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .header-left {
        margin-left: 0;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .header .hc {
        margin-left: 0;
      }

      #idsLogout {
        position: absolute;
        right: 24px;
        top: 50%;
        transform: translateY(-50%);
      }

      #idsLogout:hover {
        transform: translateY(-50%) translateY(-1px);
      }

      .header a.nav-link {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 999px;
        color: #f5f7ff;
        text-decoration: none;
        font-weight: 800;
        font-size: 14px;
        letter-spacing: 0.3px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.10);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        transition: transform .15s ease, background .15s ease, border-color .15s ease;
      }

      .header a.nav-link:hover {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(52, 152, 219, 0.35);
      }

      .header a.nav-link::after {
        display: none;
      }

      .header-logos {
        display: flex;
        align-items: center;
        gap: 0;
        flex: 0 0 auto;
      }

      .header .logo1,
      .header .logo2,
      .header .logo3 {
        display: flex;
        align-items: center;
        justify-content: center;
        width: auto;
        height: 60px;
        margin-right: 0;
      }

      .header .logo1 {
        margin-left: 0;
        height: 72px;
      }
    </style>

    <script>
      (function () {
        const API_BASE = "http://192.168.1.2:3000";
        const LOGIN_URL = "http://192.168.1.2:3000/login";

        async function doLogout(event) {
          if (event) event.preventDefault();
          try {
            await fetch(API_BASE + "/api/auth/logout", {
              method: "POST",
              credentials: "include"
            });
          } catch {}
          window.location.replace(LOGIN_URL);
        }

        document.addEventListener("DOMContentLoaded", function () {
          const button = document.getElementById("idsLogout");
          if (button) button.addEventListener("click", doLogout);
        });
      })();
    </script>
