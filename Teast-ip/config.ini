# =====================================================
# Industrial Data Server Configuration
# =====================================================

[General]
# Service name for logging
ServiceName=IndustrialDataServer

# Log level: DEBUG, INFO, WARN, ERROR
LogLevel=INFO

# Log directory path
LogPath=./logs

# Maximum log file size (e.g., 10MB, 50MB)
MaxLogSizeMB=10

# Number of backup log files to keep
MaxLogFiles=5

# Enable database logging (in addition to file logging)
EnableDatabaseLogging=true

# State file for persisting alarm states
StateFilePath=./data/last_alarm_states.json

# Reload flag file path (touch this file to reload config)
ReloadFlagPath=./data/reload_flag.txt

# Log Modbus/IEC104 connection status periodically (ms). Set 0 to disable.
ConnectionStatusLogIntervalMs=60000

[Database]
# SQL Server connection settings
Server=localhost

#DESKTOP-MJMIST2\WINCC
Database=IndustrialDB
# Explicit ODBC driver name
Driver=ODBC Driver 18 for SQL Server
# User/Password not needed with Windows Authentication
# User=
# Password=

# Use Windows Authentication instead of SQL Auth
UseWindowsAuth=true

# Connection pool settings
PoolMin=2
PoolMax=10

# Timeout settings (in milliseconds)
ConnectionTimeout=30000
RequestTimeout=60000

# Retry settings
MaxRetries=3
RetryDelayMs=5000

# Enable encryption
Encrypt=false
TrustServerCertificate=true

[IEC104]
# IEC 60870-5-104 client (master) settings.
# The system connects to IEC104 outstations (RTUs / data loggers) and reads.
# Per-device timers (t1/t2/t3/k/w/gi_interval) come from the IEC104 device
# sheet / IEC104Devices table; the values below are defaults/fallbacks.

# TCP connection timeout (ms)
ConnectionTimeoutMs=10000

# Auto reconnect on connection loss
AutoReconnect=true

# Reconnect interval (ms)
ReconnectIntervalMs=10000

# Default TCP port (IEC104 standard is 2404)
DefaultPort=2404

# Default IEC104 protocol parameters (overridden per device)
T1=15
T2=10
T3=20
K=12
W=8
GiInterval=60

[Modbus]
# Default timeout for Modbus connections (ms)
ConnectionTimeoutMs=5000

# Read timeout (ms)
ReadTimeoutMs=3000

# Auto reconnect on connection loss
AutoReconnect=true

# Reconnect interval (ms)
ReconnectIntervalMs=10000

[AlarmService]
# Enable alarm service
Enabled=true

# Scan interval for reading alarm tags (ms)
ScanIntervalMs=1000

# Number of consecutive true readings before triggering alarm
ConsecutiveTrueCount=3

# Number of consecutive false readings before ending alarm
ConsecutiveFalseCount=3

# Chatter filter - minimum time between state changes (ms)
ChatterFilterMs=1000

# Batch size for database operations
BatchSize=50

# Buffer size for readings (number of readings to buffer)
BufferSize=3000

# Thread pool size for alarm processing
ThreadPoolSize=2

[HistorianService]
# Enable historian service
Enabled=true

# Batch size for database inserts
BatchSize=100

# Flush interval - write to database even if batch not full (ms)
FlushIntervalMs=5000

# Buffer size (max readings to hold in memory)
BufferSize=10000

# Thread pool size for historian processing
ThreadPoolSize=2

# Default quality value (OPC Quality: 192 = Good)
DefaultQuality=192

[Retention]
# Enable periodic cleanup of old data (prevents DB growth without bounds)
Enabled=false

# How often to run cleanup (ms)
RunIntervalMs=21600000

# Delay after startup before first cleanup (ms)
InitialDelayMs=60000

# Retention windows (days). Set 0 to disable cleanup for that table.
HistorianDays=30
AlarmDays=90
SystemLogsDays=14

# Delete tuning (batch size + pause between batches)
BatchSize=10000
PauseMs=100
MaxRunMs=600000

# RevokedTokens housekeeping: delete expired (dead) logout tokens.
# Runs even when Enabled=false above, because it only removes already-expired
# JWTs (no real data is ever deleted). Set to false to disable.
RevokedTokensCleanup=true
RevokedTokensIntervalMs=21600000

[ExcelDevices]
# Load PLCs/Modbus devices from Excel sheets instead of the database.
# Sheet names supported: "PLCs" and "Modbus" (case-insensitive).
# When enabled, the server also watches these files and auto-loads new/updated devices.
Enabled=false

# Comma-separated Excel file paths to scan for PLCs/Modbus sheets.
Files=./excel-data/Analog_Alarm.xlsx,./excel-data/Discrete_Alarm.xlsx,./excel-data/History.xlsx

# How often to re-scan Excel files for changes (ms)
PollIntervalMs=10000

[API]
# Enable REST API
Enabled=true

# API port
Port=3000

# API host (0.0.0.0 for all interfaces)
Host=0.0.0.0

# Enable CORS
EnableCors=true

# CORS allowed origins (comma-separated, * for all)
# IMPORTANT: when using cookies (credentials: include), CorsOrigins cannot be "*".
# Put your UI origins here (comma-separated).
CorsOrigins=http://192.168.1.2:5000,http://127.0.0.1:5000

# API rate limiting (requests per minute, 0 = disabled)
RateLimitPerMinute=1000

# JWT secret for authentication (change this!)
JwtSecret=your-super-secret-jwt-key-change-this

# JWT expiration (hours)
JwtExpirationHours=24

# JWT expiration (days). If set, overrides JwtExpirationHours.
JwtExpirationDays=30

[WebSocket]
# Enable WebSocket for live updates
Enabled=true

# WebSocket path
Path=/ws

# Heartbeat interval (ms)
HeartbeatIntervalMs=30000

# Client timeout (ms)
ClientTimeoutMs=60000

# Max clients (0 = unlimited)
MaxClients=100

[Metrics]
# Enable metrics collection
Enabled=true

# Metrics collection interval (ms)
CollectionIntervalMs=60000

# Enable Prometheus metrics endpoint
EnablePrometheus=true

# Prometheus metrics path
PrometheusPath=/metrics

[EmergencyAdmin]
# Fixed "break-glass" administrator account (NOT stored in DB, so it will not appear in User Interface).
# Recommended: set PasswordHash (bcrypt) and leave Password empty.
# You can generate a bcrypt hash with: node tools/seed-admin.js (or we can add a dedicated tool).
